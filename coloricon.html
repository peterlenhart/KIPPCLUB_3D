    // === SCROLLBAND (1-11, Grundstellung 6) ===
    (function() {
      const strip = document.getElementById('scrollBandStrip');
      const wrap = document.getElementById('scrollBandWrap');
      if (!strip || !wrap) return;
      
      const CELL_W = 56;
      const TOTAL = 11;
      let bandIdx = 5; // 0-basiert, 5 = Zahl 6
      let currentNum = null;
      let touchStartX = 0;
      let touchStartIdx = 0;
      
      function updateBandPos(animate) {
        const wrapW = wrap.offsetWidth || 306;
        // Alle Buttons haben fixe Breite CELL_W — Position ist immer exakt berechenbar
        const offset = wrapW / 2 - CELL_W / 2 - bandIdx * CELL_W;
        strip.style.transition = animate ? 'transform 0.35s cubic-bezier(0.25, 0.1, 0.25, 1)' : 'none';
        strip.style.transform = 'translateX(' + offset + 'px)';
        updateBandStyle();
      }
      
      function updateBandStyle() {
        const btns = strip.querySelectorAll('.numBtn');
        btns.forEach((b, i) => {
          const dist = Math.abs(i - bandIdx);
          // Breite IMMER fix — nur font-size und opacity skalieren
          b.style.minWidth = CELL_W + 'px';
          b.style.maxWidth = CELL_W + 'px';
          b.classList.toggle('center', dist === 0);
          b.style.opacity = Math.max(0.35, 1 - dist * 0.18);
          b.style.fontSize = Math.round(30 * Math.max(0.65, 1 - dist * 0.08)) + 'px';
        });
        window._selectedKippAnzahl = bandIdx + 1;
      }
      
      function selectNum(n) {
        currentNum = n;
        const btns = strip.querySelectorAll('.numBtn');
        btns.forEach(b => {
          if (parseInt(b.dataset.num) === n) b.classList.add('selected');
          else b.classList.remove('selected');
        });
      }
      
      function clearSelection() {
        currentNum = null;
        strip.querySelectorAll('.numBtn').forEach(b => b.classList.remove('selected'));
      }
      
      function resetBand() {
        bandIdx = 5;
        clearSelection();
        updateBandPos(true);
      }
      
      // Touch: Swipe with momentum
      let touchMoved = false;
      let lastMoveX = 0;
      let lastMoveTime = 0;
      let velocity = 0;
      let momentumAnim = null;
      let pixelOffset = 0;
      
      wrap.addEventListener('touchstart', (e) => {
        e.stopPropagation();
        window._numBtnTouchActive = true;
        touchStartX = e.touches[0].clientX;
        touchStartIdx = bandIdx;
        touchMoved = false;
        lastMoveX = e.touches[0].clientX;
        lastMoveTime = performance.now();
        velocity = 0;
        if (momentumAnim) { cancelAnimationFrame(momentumAnim); momentumAnim = null; }
        strip.style.transition = 'none';
        pixelOffset = 0;
      }, { passive: false });
      
      wrap.addEventListener('touchmove', (e) => {
        e.stopPropagation();
        e.preventDefault();
        const now = performance.now();
        const x = e.touches[0].clientX;
        const dx = x - touchStartX;
        if (Math.abs(dx) > 4) touchMoved = true;
        
        const dt = now - lastMoveTime;
        if (dt > 0 && dt < 60) {
          velocity = velocity * 0.5 + ((x - lastMoveX) / dt) * 0.5;
        } else if (dt >= 60) {
          velocity = 0;
        }
        lastMoveX = x;
        lastMoveTime = now;
        pixelOffset = dx;

        // Exakte Position: alle Zellen fix CELL_W breit
        const wrapW = wrap.offsetWidth || 306;
        const tx = wrapW / 2 - CELL_W / 2 - touchStartIdx * CELL_W + dx;
        strip.style.transform = 'translateX(' + tx + 'px)';

        // Zentrierte Zahl direkt aus translateX
        bandIdx = Math.max(0, Math.min(TOTAL - 1, Math.round((wrapW / 2 - CELL_W / 2 - tx) / CELL_W)));
        updateBandStyle();
      }, { passive: false });

      wrap.addEventListener('touchend', (e) => {
        e.stopPropagation();
        e.preventDefault();
        setTimeout(() => { window._numBtnTouchActive = false; }, 100);

        if (!touchMoved) {
          // Tap
          const touch = e.changedTouches[0];
          const wrapRect = wrap.getBoundingClientRect();
          const tapX = touch.clientX - wrapRect.left;
          const wrapW = wrapRect.width;
          const tappedIdx = Math.max(0, Math.min(TOTAL - 1, Math.round((tapX - wrapW / 2) / CELL_W) + bandIdx));
          if (tappedIdx === bandIdx) {
            const n = bandIdx + 1;
            selectNum(n);
            if (gamePhase === 'spielen' && !isAnimating) {
              (async () => {
                for (let i = 0; i < n; i++) {
                  let dir;
                  if      (currentQuadrant === 0) dir = 'east';
                  else if (currentQuadrant === 1) dir = 'south_from_q1';
                  else if (currentQuadrant === 2) dir = 'west_from_q2';
                  else                            dir = 'north';
                  await performKipp(dir, 600);
                  advanceTopFace();
                  if (i < n - 1) await new Promise(r => setTimeout(r, 200));
                }
                clearSelection();
                await checkIconTreffer();
              })();
            }
          }
        } else {
          // Schwung: aktuelle translateX + velocity-Auslauf → Ziel-Index
          const wrapW = wrap.offsetWidth || 306;
          const tx = parseFloat(strip.style.transform.replace('translateX(', '')) || 0;
          const txCoasted = tx + velocity * 150;
          bandIdx = Math.max(0, Math.min(TOTAL - 1, Math.round((wrapW / 2 - CELL_W / 2 - txCoasted) / CELL_W)));

          // Zielposition
          const snapOffset = wrapW / 2 - CELL_W / 2 - bandIdx * CELL_W;

          // Gedämpfte Schwingung: Pendel-Einschnapp
          const startX = parseFloat(strip.style.transform.replace('translateX(', '')) || 0;
          const dist = snapOffset - startX;
          const t0 = performance.now();
          const dur = 700;
          const A = 0.18;
          const omega = 1.8 * 2 * Math.PI;
          const damping = 5.5;

          strip.style.transition = 'none';
          updateBandStyle();

          function pendulumSnap() {
            const t = (performance.now() - t0) / dur;
            if (t >= 1) {
              strip.style.transform = 'translateX(' + snapOffset + 'px)';
              momentumAnim = null;
              updateBandStyle();
              return;
            }
            const ease = 1 - Math.pow(1 - t, 3);
            const swing = A * Math.exp(-damping * t) * Math.sin(omega * t);
            strip.style.transform = 'translateX(' + (startX + dist * (ease + swing)) + 'px)';
            momentumAnim = requestAnimationFrame(pendulumSnap);
          }
          momentumAnim = requestAnimationFrame(pendulumSnap);
        }
      }, { passive: false });
      
      // Desktop click fallback
      wrap.addEventListener('click', (e) => {
        e.stopPropagation();
        const wrapRect = wrap.getBoundingClientRect();
        const tapX = e.clientX - wrapRect.left;
        const wrapW = wrapRect.width;
        const centerX = wrapW / 2;
        const firstBtn = strip.querySelector('.numBtn');
        const actualCellW = firstBtn ? firstBtn.getBoundingClientRect().width : (wrapW / 5);
        const offsetFromCenter = tapX - centerX;
        const tappedIdx = Math.max(0, Math.min(TOTAL - 1, bandIdx + Math.round(offsetFromCenter / actualCellW)));
        
        if (tappedIdx !== bandIdx) {
          // Nicht-mittige Zahl: nichts tun
        } else {
          const n = bandIdx + 1;
          selectNum(n);
          if (gamePhase === 'spielen' && !isAnimating) {
            (async () => {
              for (let i = 0; i < n; i++) {
                let dir;
                if (currentQuadrant === 0) dir = 'east';
                else if (currentQuadrant === 1) dir = 'south_from_q1';
                else if (currentQuadrant === 2) dir = 'west_from_q2';
                else dir = 'north';
                await performKipp(dir, 600);
                advanceTopFace();
                if (i < n - 1) await new Promise(r => setTimeout(r, 200));
              }
              clearSelection();
              await checkIconTreffer();
            })();
          }
        }
      });
      
      // Global API
      window._scrollBandToNum = function(n) {
        bandIdx = Math.max(0, Math.min(TOTAL - 1, n - 1));
        updateBandPos(true);
        selectNum(n);
      };
      // Scroll-only: bewegt Band ohne .selected zu setzen (für Tutorial-Hand-Animation)
      window._scrollBandScrollOnly = function(n) {
        bandIdx = Math.max(0, Math.min(TOTAL - 1, n - 1));
        updateBandPos(true);
        clearSelection();
      };
      window._resetScrollBand = function() { resetBand(); };
      window._highlightNum = function(n) {
        if (n === null) { clearSelection(); return; }
        window._scrollBandToNum(n);
      };
      
      // Initial position
      updateBandPos(false);
    })();

    // CW/CCW: wenn Zahl schon gewählt → Kipp starten
    async function triggerKipp(direction) {
      try {
        if (gamePhase !== 'spielen') return;
        if (selectedAnzahl === null) return;
        if (isAnimating) return;

        const anzahl = selectedAnzahl;
        kippDirection = direction || 'cw';
        isAnimating = true;

        const T = getTiming();
        for (let i = 0; i < anzahl; i++) {
          const tStep = (anzahl <= 1) ? 0 : (i / (anzahl - 1));
          const stepMul = lerp(1.0, STEP_MAX, tStep);
          const kipTime = Math.max(40, Math.round(T.kipMs * stepMul));
          const holdTime = Math.max(40, Math.round(T.wMs * stepMul));

          let dir;
          if (currentQuadrant === 0) dir = 'east';
          else if (currentQuadrant === 1) dir = 'south_from_q1';
          else if (currentQuadrant === 2) dir = 'west_from_q2';
          else dir = 'north';

          isAnimating = false;
          await performKipp(dir, kipTime);
          advanceTopFace();
          await new Promise(r => setTimeout(r, holdTime));
        }

        isAnimating = false;
        selectedAnzahl = null;
        if (window._resetScrollBand) window._resetScrollBand();
      } catch(e) {
        isAnimating = false;
        selectedAnzahl = null;
      }
    }

    if (cwBtn) cwBtn.addEventListener('click', () => triggerKipp('cw'));
    if (ccwBtn) ccwBtn.addEventListener('click', () => triggerKipp('ccw'));

    // Animation loop
    function renderLoop() {
      requestAnimationFrame(renderLoop);
      
      // Puls-Animation für verdecktes Kippziel (nur wenn nicht aufgedeckt)
      if (verdecktesMesh.visible && !verdecktesMesh.userData.revealed) {
        const t = (Date.now() % 1500) / 1500 * Math.PI * 2;
        const pulse = (Math.sin(t) + 1) / 2; // 0 bis 1
        const s = 1 + 0.08 * pulse;
        verdecktesMesh.scale.set(s, s, s);
        verdecktesMat.opacity = 1 - 0.4 * pulse;
      }
      
      renderer.render(scene, camera);
    }

    // resetButton auf Einstiegsseite sofort sichtbar + positionieren
    positionResetButton();

    // Numpad (1-6 Tasten) positionieren: feste Position
    (function() {
      const el = document.getElementById('numBtns');
      if (!el) return;
      el.style.top = '557px';
    })();

    // === ICONS: Kippziel-Bereich positionieren und initialisieren ===
    const FARBE_QUADRANT = { gruen: 0, orange: 1, blau: 2, violett: 3 };
    const KIPPZIEL_FARBEN = ['blau', 'gruen', 'orange', 'violett'];
    let iconTargetVal = 0;
    let iconTargetFarbe = '';
    let iconHits = 0;
    let iconMisses = 0;
    let iconKippzielActive = false;
    let iconUsedCombos = new Set();
    
    // === BRAINY/BRAIN Treffererkennung ===
    // Statische Slot→V Zuordnung (verifiziert für alle 12 Kipp-Positionen)
    const BRAINY_SLOT_V = {
      f0: ['V3', 'V1', 'V2'],
      f1: ['V1', 'V3', 'V2'],
      f2: ['V3', 'V1', 'V2']
    };
    
    // V → Farbe pro Quadrant
    const V_COLORS = {
      3: { V1: 'blau',    V2: 'violett', V3: 'gruen' },
      0: { V1: 'violett', V2: 'gruen',   V3: 'orange' },
      1: { V1: 'gruen',   V2: 'orange',  V3: 'blau' },
      2: { V1: 'orange',  V2: 'blau',    V3: 'violett' }
    };
    
    // Bestimme welches V ein Motiv belegt
    function getMotifV(topFaceKey, targetVal) {
      const topOff = topFaceKey === 'f0' ? 0 : (topFaceKey === 'f1' ? 4 : 8);
      const numSlots = currentLevel >= 3 ? 3 : 2;
      for (let s = 0; s < numSlots; s++) {
        if (deck[topOff + s] === targetVal) {
          return BRAINY_SLOT_V[topFaceKey][s] || null;
        }
      }
      return null;
    }
    
    // Prüfe ob Kombi sofortiger Treffer wäre
    function isImmediateHit(val, farbe) {
      const topVals = getTopFaceVals();
      if (!topVals.includes(val)) return false;
      
      if (currentLevel === 1) {
        return FARBE_QUADRANT[farbe] === currentQuadrant;
      } else {
        const v = getMotifV(topFace, val);
        if (!v) return false;
        return V_COLORS[currentQuadrant] && V_COLORS[currentQuadrant][v] === farbe;
      }
    }
    
    function generateIconKippziel() {
      // Visible motifs directly from deck indices
      const visibleVals = [];
      if (currentLevel >= 3) {
        visibleVals.push(deck[0], deck[1], deck[2], deck[4], deck[5], deck[6], deck[8], deck[9], deck[10]);
      } else if (currentLevel >= 2) {
        visibleVals.push(deck[0], deck[1], deck[4], deck[5], deck[8], deck[9]);
      } else {
        visibleVals.push(deck[0], deck[4], deck[8]);
      }
      
      // TopFace vals
      const topOff = topFace === 'f0' ? 0 : (topFace === 'f1' ? 4 : 8);
      const topVals = currentLevel >= 3 ? [deck[topOff], deck[topOff+1], deck[topOff+2]] : (currentLevel >= 2 ? [deck[topOff], deck[topOff+1]] : [deck[topOff]]);
      
      let attempts = 0;
      do {
        iconTargetVal = visibleVals[Math.floor(Math.random() * visibleVals.length)];
        iconTargetFarbe = KIPPZIEL_FARBEN[Math.floor(Math.random() * 4)];
        attempts++;
      } while (attempts < 100 && (iconUsedCombos.has(iconTargetVal + '_' + iconTargetFarbe) || isImmediateHit(iconTargetVal, iconTargetFarbe)));
      
      // Kombi merken
      iconUsedCombos.add(iconTargetVal + '_' + iconTargetFarbe);
    }
    
    function getTopFaceVals() {
      const topOff = topFace === 'f0' ? 0 : (topFace === 'f1' ? 4 : 8);
      if (currentLevel >= 3) return [deck[topOff], deck[topOff+1], deck[topOff+2]];
      if (currentLevel >= 2) return [deck[topOff], deck[topOff+1]];
      return [deck[topOff]];
    }
    
    function updateIconStack() {
      const stack = document.getElementById('iconCardStack');
      const cards = Array.from(stack.querySelectorAll('.iconCard'));
      
      // Oberste Hintergrundkarte entfernen (die direkt unter dem Kippziel)
      if (cards.length > 0) {
        cards[cards.length - 1].remove();
      }
      
      // Verbleibende Hintergrundkarten
      const remaining = Array.from(stack.querySelectorAll('.iconCard'));
      const n = remaining.length;
      
      // Stapel nach rechts schieben: neue obere Karte (Kippziel) wieder mittig
      const baseLeft = (3 - n) * 5;
      remaining.forEach((c, i) => {
        c.style.transition = 'left 0.4s ease';
        c.style.left = (baseLeft + i * 5) + 'px';
        c.style.top = '0px';
      });
      const kzEl = document.getElementById('iconKippziel');
      kzEl.style.transition = 'left 0.4s ease';
      kzEl.style.left = (baseLeft + n * 5) + 'px';
      kzEl.style.top = '0px';
    }
    
    async function checkIconTreffer() {
      if (!iconKippzielActive) return;
      iconKippzielActive = false;
      
      const topVals = getTopFaceVals();
      let isHit = false;
      
      if (currentLevel === 1) {
        // TRAINING: Quadrant-basiert
        const requiredQ = FARBE_QUADRANT[iconTargetFarbe];
        isHit = (topVals.includes(iconTargetVal) && currentQuadrant === requiredQ);
      } else {
        // BRAINY/BRAIN: V-Position + Farbzuordnung
        if (topVals.includes(iconTargetVal)) {
          const v = getMotifV(topFace, iconTargetVal);
          if (v && V_COLORS[currentQuadrant]) {
            isHit = (V_COLORS[currentQuadrant][v] === iconTargetFarbe);
          }
        }
      }
      
      const kzEl = document.getElementById('iconKippziel');
      
      if (isHit) {
        iconHits++;
        window._hitMissSeq.push('hit');
        // Gelber Rand
        kzEl.style.borderWidth = '4px';
        kzEl.style.borderStyle = 'solid';
        kzEl.style.borderColor = '#cedb25';
        kzEl.style.animation = 'iconHitPulse 0.4s ease-in-out 3';
        
        // Farbiges Motiv auf Würfelfläche einblenden (0% → 100% in 2.5s)
        const colorMotivBase = motivForVal(iconTargetVal).replace('_grau', '');
        const colorImg = new Image();
        colorImg.src = colorMotivBase + '_' + iconTargetFarbe + '.png';
        
        const matIdx = TOP_FACE_MAT_IDX[topFace];
        const f = topFace === 'f0' ? faceSlots.f0 : (topFace === 'f1' ? faceSlots.f1 : faceSlots.f2);
        
        await new Promise(resolve => {
          const dur = 2500;
          const startTime = performance.now();
          
          function animFade() {
            const t = Math.min((performance.now() - startTime) / dur, 1);
            const canvas = createFaceTexture(f.slotMap, f.imgRot, 1);
            const ctx = canvas.getContext('2d');
            if (colorImg.complete) {
              ctx.globalAlpha = t;
              ctx.save();
              // Farbmotiv exakt mit derselben Funktion/Logik wie das graue zeichnen
              drawMotifOnCanvas(ctx, colorImg, f.slotMap, iconTargetVal, f.imgRot);
              ctx.restore();
            }
            cubeMaterial[matIdx].map = new THREE.CanvasTexture(canvas);
            cubeMaterial[matIdx].needsUpdate = true;
            if (t < 1) requestAnimationFrame(animFade);
            else resolve();
          }
          if (colorImg.complete) animFade();
          else colorImg.onload = animFade;
        });
        
        await new Promise(r => setTimeout(r, 1500));
        kzEl.style.animation = '';
        kzEl.src = 'motiv_verdeckt.png';
        kzEl.style.borderColor = '#6b5040';
        kzEl.style.borderWidth = '3px';
        
        // Würfelfläche zurück auf grau (farbiges Overlay entfernen)

    async function autoBrainyBlick() {
      if (isAnimating) return;
      isAnimating = true;
      
      // Save camera
      const camSave = { 
        px: camera.position.x, py: camera.position.y, pz: camera.position.z 
      };
      const lookBase = { x: 0, y: 0.46875, z: 0.7 + southShift };
      
      // CW directions + welche Displayränder fixiert bleiben
      const cwDirs = {
        3: { dir: 'north', toQ: 0, keepEdges: ['left','top'] },
        0: { dir: 'east', toQ: 1, keepEdges: ['top'] },
        1: { dir: 'south_from_q1', toQ: 2, keepEdges: ['right','top'] },
        2: { dir: 'west_from_q2', toQ: 3, keepEdges: ['top'] }
      };
      
      const yShiftFull = 0;
      const yShiftCenter = 0;
      const baseZoomZ = 0;
      const baseZoomZCenter = 0;
      
      // Referenzpunkte am Boxrahmen (Außenkanten)
      const edgeRefs = {
        left:  new THREE.Vector3(-0.625, 0.234, 0.1105),
        right: new THREE.Vector3(0.625, 0.234, 0.1105),
        top:   new THREE.Vector3(0, 0.468, -0.515)
      };
      
      function computeShifts(keepEdges, yShift, zoomZ) {
        camera.position.set(camSave.px, camSave.py, camSave.pz);
        camera.lookAt(lookBase.x, lookBase.y, lookBase.z);
        camera.updateMatrixWorld();
        
        const targetNDC = {};
        for (const key of keepEdges) {
          const p = edgeRefs[key].clone().project(camera);
          targetNDC[key] = { x: p.x, y: p.y };
        }
        
        let xShift = 0;
        let zPan = 0;
        
        // X-Shift: left oder right fixieren
        if (keepEdges.includes('left') || keepEdges.includes('right')) {
          const edgeKey = keepEdges.includes('left') ? 'left' : 'right';
          const ref = edgeRefs[edgeKey];
          const targetX = targetNDC[edgeKey].x;
          
          camera.position.set(camSave.px, camSave.py + yShift, camSave.pz + zoomZ);
          camera.lookAt(lookBase.x, lookBase.y, lookBase.z);
          camera.updateMatrixWorld();
          const ndc0 = ref.clone().project(camera).x;
          
          camera.position.x = camSave.px + 0.1;
          camera.lookAt(lookBase.x + 0.1, lookBase.y, lookBase.z);
          camera.updateMatrixWorld();
          const ndc1 = ref.clone().project(camera).x;
          
          const slope = (ndc1 - ndc0) / 0.1;
          if (Math.abs(slope) > 0.001) xShift = (targetX - ndc0) / slope;
        }
        
        // Z-Pan: top fixieren
        if (keepEdges.includes('top')) {
          const ref = edgeRefs.top;
          const targetY = targetNDC.top.y;
          
          camera.position.set(camSave.px + xShift, camSave.py + yShift, camSave.pz + zoomZ);
          camera.lookAt(lookBase.x + xShift, lookBase.y, lookBase.z);
          camera.updateMatrixWorld();
          const ndc0 = ref.clone().project(camera).y;
          
          camera.position.z -= 0.1;
          camera.lookAt(lookBase.x + xShift, lookBase.y, lookBase.z - 0.1);
          camera.updateMatrixWorld();
          const ndc1 = ref.clone().project(camera).y;
          
          const slope = (ndc1 - ndc0) / (-0.1);
          if (Math.abs(slope) > 0.001) zPan = (targetY - ndc0) / slope;
        }
        
        // Kamera zurücksetzen
        camera.position.set(camSave.px, camSave.py, camSave.pz);
        camera.lookAt(lookBase.x, lookBase.y, lookBase.z);
        camera.updateMatrixWorld();
        
        return { xShift, zPan };
      }
      
      // --- KIPP 1 ---
      const k1 = cwDirs[currentQuadrant];
      const isCenter1 = !k1.keepEdges.includes('left') && !k1.keepEdges.includes('right');
      const yShift1 = isCenter1 ? yShiftCenter : yShiftFull;
      const zoomZ1 = isCenter1 ? baseZoomZCenter : baseZoomZ;
      const s1 = computeShifts(k1.keepEdges, yShift1, zoomZ1);
      const cubeLift1 = 0.25;
      await doHalfKippZoom(k1.dir, k1.toQ, s1.xShift, yShift1, zoomZ1, s1.zPan, cubeLift1, camSave, lookBase);
      advanceTopFace();
      
      await new Promise(r => setTimeout(r, 600));
      
      // --- KIPP 2 ---
      const k2 = cwDirs[currentQuadrant];
      const isCenter2 = !k2.keepEdges.includes('left') && !k2.keepEdges.includes('right');
      const yShift2 = isCenter2 ? yShiftCenter : yShiftFull;
      const zoomZ2 = isCenter2 ? baseZoomZCenter : baseZoomZ;
      const s2 = computeShifts(k2.keepEdges, yShift2, zoomZ2);
      const cubeLift2 = 0.25;
      await doHalfKippZoom(k2.dir, k2.toQ, s2.xShift, yShift2, zoomZ2, s2.zPan, cubeLift2, camSave, lookBase);
      advanceTopFace();
      
      await new Promise(r => setTimeout(r, 600));
      
      // --- KIPP 3 ---
      const k3 = cwDirs[currentQuadrant];
      const isCenter3 = !k3.keepEdges.includes('left') && !k3.keepEdges.includes('right');
      const yShift3 = isCenter3 ? yShiftCenter : yShiftFull;
      const zoomZ3 = isCenter3 ? baseZoomZCenter : baseZoomZ;
      const s3 = computeShifts(k3.keepEdges, yShift3, zoomZ3);
      const cubeLift3 = 0.25;
      await doHalfKippZoom(k3.dir, k3.toQ, s3.xShift, yShift3, zoomZ3, s3.zPan, cubeLift3, camSave, lookBase);
      advanceTopFace();
      
      // Kamera exakt zurücksetzen
      camera.position.set(camSave.px, camSave.py, camSave.pz);
      camera.lookAt(lookBase.x, lookBase.y, lookBase.z);
      camera.updateMatrixWorld();
      
      
      isAnimating = false;
    }
    
    async function doHalfKippZoom(direction, toQ, xShift, yShift, zShift, zPan, cubeLift, camSave, lookBase) {
      // Setup pivot
      let pivotPoint, axis, targetRotation;
      if (direction === 'north') { pivotPoint = new THREE.Vector3(-0.234375, 0, 0.109375); axis = 'x'; targetRotation = -Math.PI/2; }
      else if (direction === 'south') { pivotPoint = new THREE.Vector3(-0.234375, 0, 0.109375); axis = 'x'; targetRotation = Math.PI/2; }
      else if (direction === 'east') { pivotPoint = new THREE.Vector3(0, 0, 0.343125); axis = 'z'; targetRotation = -Math.PI/2; }
      else if (direction === 'west') { pivotPoint = new THREE.Vector3(0, 0, 0.343125); axis = 'z'; targetRotation = Math.PI/2; }
      else if (direction === 'south_from_q1') { pivotPoint = new THREE.Vector3(0.234375, 0, 0.109375); axis = 'x'; targetRotation = Math.PI/2; }
      else if (direction === 'north_from_q2') { pivotPoint = new THREE.Vector3(0.234375, 0, 0.109375); axis = 'x'; targetRotation = -Math.PI/2; }
      else if (direction === 'west_from_q2') { pivotPoint = new THREE.Vector3(0, 0, 0.343125); axis = 'z'; targetRotation = Math.PI/2; }
      else if (direction === 'east_from_q3') { pivotPoint = new THREE.Vector3(0, 0, 0.343125); axis = 'z'; targetRotation = -Math.PI/2; }
      
      const pivotGroup = new THREE.Group();
      pivotGroup.position.copy(pivotPoint);
      kipGroup.add(pivotGroup);
      cube.updateMatrixWorld();
      const cwp = new THREE.Vector3();
      cube.getWorldPosition(cwp);
      kipGroup.remove(cube);
      cube.position.copy(cwp.clone().sub(pivotPoint));
      pivotGroup.add(cube);
      
      // Halbkipp: Perspektivausgleich bei Nord-Süd
      // Weg von Kamera (targetRot < 0): 38° | Zur Kamera (targetRot > 0): 52°
      const halfRot = (axis === 'x') 
        ? targetRotation * ((targetRotation < 0 ? 38 : 52) / 90)
        : targetRotation / 2;
      const remainRot = targetRotation - halfRot;
      await new Promise(resolve => {
        const st = performance.now();
        const dur = 1000;
        (function a1() {
          const p = Math.min((performance.now() - st) / dur, 1);
          const e = p * (2 - p); // ease-out
          if (axis === 'x') pivotGroup.rotation.x = e * halfRot;
          else pivotGroup.rotation.z = e * halfRot;
          if (cubeLift) pivotGroup.position.y = pivotPoint.y + cubeLift * e;
          if (p < 1) requestAnimationFrame(a1);
          else resolve();
        })();
      });
      
      // Phase 2: Hold 3s
      await new Promise(r => setTimeout(r, 3000));
      
      // Phase 3: complete 45° → 90° (1000ms)
      await new Promise(resolve => {
        const st = performance.now();
        const dur = 1000;
        let klackFired = false;
        (function a2() {
          const p = Math.min((performance.now() - st) / dur, 1);
          const eKipp = p * p; // ease-in (gravity)
          const eCam = p * (2 - p);
          const rot = halfRot + eKipp * remainRot;
          if (axis === 'x') pivotGroup.rotation.x = rot;
          else pivotGroup.rotation.z = rot;
          if (cubeLift) pivotGroup.position.y = pivotPoint.y + cubeLift * (1 - eCam);
          if (!klackFired && eKipp > 0.75) { klackFired = true; playKlack(); }
          if (p < 1) requestAnimationFrame(a2);
          else {
            if (cubeLift) pivotGroup.position.y = pivotPoint.y;
            resolve();
          }
        })();
      });
      
      // Finalize
      cube.updateMatrixWorld();
      const newWP = new THREE.Vector3();
      cube.getWorldPosition(newWP);
      const newWQ = new THREE.Quaternion();
      cube.getWorldQuaternion(newWQ);
      if (pivotGroup.parent) pivotGroup.parent.remove(pivotGroup);
      cube.position.copy(newWP);
      cube.quaternion.copy(newWQ);
      kipGroup.add(cube);
      currentQuadrant = toQ;
    }

    // Bewegt Hand UND scrollt Band gleichzeitig OHNE Selektion (FIX 1)
    function moveHandWithBand(toX, toY, durMs, fromNum, toNum) {
      const actualDur = durMs * (typeof HAND_SPEED_MUL !== 'undefined' ? HAND_SPEED_MUL : 1);
      return new Promise(resolve => {
        const sx = _handX, sy = _handY;
        const startT = performance.now();
        function tick() {
          const t = Math.min((performance.now() - startT) / actualDur, 1);
          const e = t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t+2, 2)/2;
          setHandPos(sx + (toX - sx) * e, sy + (toY - sy) * e);
          // Band synchron ohne Selektion
          if (window._scrollBandScrollOnly) {
            const n = Math.round(fromNum + (toNum - fromNum) * e);
            window._scrollBandScrollOnly(n);
          }
          if (t < 1) requestAnimationFrame(tick);
          else { setHandPos(toX, toY); if (window._scrollBandScrollOnly) window._scrollBandScrollOnly(toNum); resolve(); }
        }
        requestAnimationFrame(tick);
      });
    }

      const eyeEl = document.getElementById('eyeIcon');
      const boxTopPt = new THREE.Vector3(0, 0.52, 0.1105);
      boxTopPt.project(camera);
      const eyeTopPx = Math.round((-boxTopPt.y * 0.5 + 0.5) * 720) - 50;
      eyeEl.style.cssText   = '';
      eyeEl.style.position  = 'absolute';
      eyeEl.style.top       = eyeTopPx + 'px';
      eyeEl.style.left      = '50%';
      eyeEl.style.width     = '156px';
      eyeEl.style.height    = 'auto';
      eyeEl.style.opacity   = '1';
      eyeEl.style.zIndex    = '15';
      eyeEl.style.transform = 'translateX(-50%)';
      eyeEl.style.filter    = 'drop-shadow(0 2px 6px rgba(255,255,255,0.4))';
      eyeEl.style.animation = 'none'; void eyeEl.offsetWidth;
      eyeEl.style.animation = 'eyePulse 1.5s ease-in-out infinite';
      eyeEl.style.display   = 'block';
      eyeEl.style.pointerEvents = 'none';

      await runKipp21EckblickKniff(true);

      // SCHRITT 2: Würfel zurück — Auge aus
      eyeEl.style.display = 'none';
      await sleep(500);

      // Kippziel festlegen (Position nach Eckblick wiederhergestellt)
      setTutorialFixedCombo();

      // FIX 2: Verdecktes Kippziel — kein Pulsieren, kein weißer Hintergrund
      const kzEl = document.getElementById('iconKippziel');
      kzEl.src             = 'motiv_verdeckt.png';
      kzEl.style.cssText   = 'position:absolute;left:15px;top:0px;width:120px;height:120px;' +
        'border:3px solid #6b5040;border-radius:6px;background:#e8e0d4;' +
        'box-shadow:-3px 2px 4px rgba(0,0,0,0.25);';
      kzEl.style.animation = '';   // FIX 2: kein Pulsieren
      const ikr = document.getElementById('iconKippzielRow');
      const nb  = document.getElementById('numBtns');
      if (ikr) ikr.classList.remove('hidden');
      if (nb)  nb.classList.add('hidden');
      iconKippzielActive = false;
      await sleep(700);

      // SCHRITT 3-5: Hand von Süd → knapp über Kärtchen → senken → Klick
      const cardX = 180;
      const cardY = 428 + 60; // top:428 + halbe Kartenhöhe 60px

      setHandPos(cardX, 740);
      handEl.style.opacity = '1';
      updateHandShadow(cardX, 740, true);
      await moveHandSmooth(cardX, cardY - 12, 900);
      await sleep(250);
      await moveHandSmooth(cardX, cardY, 250);
      await sleep(400);

      // Kärtchen aufdecken
      const motivBase = motivForVal(iconTargetVal).replace('_grau', '');
      kzEl.src = motivBase + '_' + iconTargetFarbe + '.png';
      iconKippzielActive = true;

      // SCHRITT 6: Scrollband einblenden
      if (nb) nb.classList.remove('hidden');
      if (window._scrollBandScrollOnly) window._scrollBandScrollOnly(6); // Startposition, keine Selektion
      await sleep(300);

      // SCHRITT 7: Hand hebt sich, fährt zum Scrollband
      const sbCenterX = 180;
      const sbY       = 557 + 19;
      const sbRightX  = 180 + 100;
      const sbLeftX   = 180 - 100;

      await moveHandSmooth(sbCenterX, sbY, 700);
      await sleep(300);

      // SCHRITT 8: Hand wischt links→rechts — Band scrollt synchron 6→1 (kein select)
      await moveHandWithBand(sbRightX, sbY, 1200, 6, 1);
      await sleep(400);

      // SCHRITT 9: Hand wischt rechts→links — Band scrollt synchron 1→11 (kein select)
      await moveHandWithBand(sbLeftX, sbY, 1000, 1, 11);
      await sleep(400);

      // SCHRITT 10: Hand stellt korrekte Zahl ein 11→5, synchron (kein select)
      await moveHandWithBand(sbCenterX, sbY, 700, 11, 5);
      await sleep(600);

      // SCHRITT 11: Hand tippt auf mittlere Zahl — JETZT erst select — Hand verschwindet
      if (window._scrollBandToNum) window._scrollBandToNum(5);
      handEl.style.opacity = '0';
      updateHandShadow(0, 0, false);
      await sleep(250);

      // SCHRITT 12: Würfel kippt 5× CW
      isAnimating = false;
      for (let i = 0; i < 5; i++) {
        let dir;
        if      (currentQuadrant === 0) dir = 'east';
        else if (currentQuadrant === 1) dir = 'south_from_q1';
        else if (currentQuadrant === 2) dir = 'west_from_q2';
        else                            dir = 'north';
        await performKipp(dir, 600);
        advanceTopFace();
        if (i < 4) await sleep(200);
      }
      isAnimating = false;

      // SCHRITT 13: Treffer erkannt — Hit-Animation (gelber Rand, Farbmotiv)
      iconKippzielActive = false;
      iconHits   = 4;  // 4|0 → 100% im Endscreen
      iconMisses = 0;

      kzEl.style.borderWidth = '4px';
      kzEl.style.borderStyle = 'solid';
      kzEl.style.borderColor = '#cedb25';
      kzEl.style.animation   = 'iconHitPulse 0.4s ease-in-out 3';

      const colorMotivBase = motivForVal(iconTargetVal).replace('_grau', '');
      const colorImg = new Image();
      colorImg.src = colorMotivBase + '_' + iconTargetFarbe + '.png';
      const hitMatIdx = TOP_FACE_MAT_IDX[topFace];
      const hitF = topFace === 'f0' ? faceSlots.f0 : (topFace === 'f1' ? faceSlots.f1 : faceSlots.f2);
      await new Promise(resolve => {
        const dur = 2500, t0 = performance.now();
        function animFade() {
          const t = Math.min((performance.now() - t0) / dur, 1);
          const canvas = createFaceTexture(hitF.slotMap, hitF.imgRot, 1);
          const ctx    = canvas.getContext('2d');
          if (colorImg.complete) {
            ctx.globalAlpha = t; ctx.save();
            ctx.translate(128, 128);
            if (hitF.imgRot) ctx.rotate(hitF.imgRot);
            ctx.rotate(Math.PI);
            ctx.drawImage(colorImg, -122, -122, 244, 244);
            ctx.restore();
          }
          cubeMaterial[hitMatIdx].map = new THREE.CanvasTexture(canvas);
          cubeMaterial[hitMatIdx].needsUpdate = true;
          if (t < 1) requestAnimationFrame(animFade); else resolve();
        }
        if (colorImg.complete) animFade(); else colorImg.onload = animFade;
      });

      await sleep(1200);
      kzEl.style.animation = '';

      // SCHRITT 14: Blur-Überblendung (+2s länger, mit Text)
      const BLUR_TEXT = {
        de: 'Nach 4 erkippten Motiven –\nBewertung / Score',
        en: 'After 4 tipped motifs –\nRating / Score',
        es: 'Tras 4 motivos volcados –\nEvaluación / Score',
        fr: 'Après 4 motifs basculés –\nÉvaluation / Score',
        it: 'Dopo 4 motivi ribaltati –\nValutazione / Score',
        tr: '4 devrilmiş motifin ardından –\nDeğerlendirme / Skor'
      };
      const blurMsg = (BLUR_TEXT[_digikippLang] || BLUR_TEXT.de).replace('\n', '<br>');
      const blurOvl = document.createElement('div');
      blurOvl.style.cssText = 'position:absolute;top:0;left:0;width:360px;height:720px;' +
        'backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px);' +
        'background:rgba(10,5,0,0.5);z-index:58;opacity:0;' +
        'transition:opacity 0.9s ease;pointer-events:none;' +
        'display:flex;align-items:center;justify-content:center;';
      const blurTxt = document.createElement('div');
      blurTxt.innerHTML = blurMsg;
      blurTxt.style.cssText = 'color:#e8dcc8;font:bold 20px Arial;text-align:center;' +
        'text-shadow:0 1px 4px rgba(0,0,0,0.9);line-height:1.5;letter-spacing:0.5px;' +
        'opacity:0;transition:opacity 0.6s ease;padding:0 30px;';
      blurOvl.appendChild(blurTxt);
      document.getElementById('uiOverlay').appendChild(blurOvl);
      void blurOvl.offsetWidth;
      blurOvl.style.opacity = '1';
      await sleep(600);
      blurTxt.style.opacity = '1';
      await sleep(3000); // +2s gegenüber vorher
      blurTxt.style.opacity = '0';
      await sleep(400);
      blurOvl.style.opacity = '0';
      await sleep(950);
      blurOvl.remove();

      // FIX 4: Fantasy-Scores VOR showIconEndScreen setzen
      // (showIconEndScreen ruft saveBestScore → würde echten Score reinschreiben)
      injectTutorialFantasyScores();

      // SCHRITT 15-16: Spielende-Ansicht + Score "100% (4 | 0)"
      showIconEndScreen();

      // saveBestScore() in showIconEndScreen hat einen zweiten 100%-Eintrag erzeugt → nochmals überschreiben
      injectTutorialFantasyScores();

      // "SPIELEN" statt "NOCHMAL" im Tutorial-Endscreen
      const _btnS = document.getElementById('btnSpielen');
      const _btnD = document.getElementById('btnDemo');

      // replayBlocker JETZT deaktivieren — User kann Buttons sofort klicken
      disableReplayBlocker();
      renderer.domElement.style.pointerEvents = 'auto';
      replayActive = false;

      // Beide Buttons clonen → alte addEventListener('click', handleStart) weg
      if (_btnS) {
        const _btnSClone = _btnS.cloneNode(true);
        _btnS.parentNode.replaceChild(_btnSClone, _btnS);
        _btnSClone.textContent = T.sp || 'SPIELEN';
        // autostart=1: Seite lädt neu, aber überspringt Startoverlay direkt ins Spiel
        _btnSClone.onclick = () => { window.location.href = 'coloricon.html?autostart=1'; };
      }
      if (_btnD) {
        const _btnDClone = _btnD.cloneNode(true);
        _btnD.parentNode.replaceChild(_btnDClone, _btnD);
        _btnDClone.onclick = () => {
          window.location.href = 'coloricon.html?level=brainy';
        };
      }

      await sleep(900);

      // Visuelle Hand-Animation ab hier ohne replayActive (eigene Promise-Bewegung)
      function moveHandVisual(toX, toY, durMs) {
        return new Promise(resolve => {
          const sx = _handX, sy = _handY;
          const t0 = performance.now();
          function tick() {
            const t = Math.min((performance.now() - t0) / durMs, 1);
            const e = t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t+2,2)/2;
            setHandPos(sx + (toX-sx)*e, sy + (toY-sy)*e);
            if (t < 1) requestAnimationFrame(tick); else resolve();
          }
          requestAnimationFrame(tick);
        });
      }

      // SCHRITT 17: Hand fährt zum Score
      setHandPos(180, 740);
      handEl.style.opacity = '1';
      updateHandShadow(180, 740, true);
      await moveHandVisual(180, 35, 1200);
      await sleep(1000);

      // SCHRITT 18-19: Hand fährt zum Pokal
      const pokalX = 360 - 13 - 22;
      const pokalY = 11 + 22;
      await moveHandVisual(pokalX, pokalY, 700);
      await sleep(400);

      handEl.style.opacity = '0';
      updateHandShadow(0, 0, false);
      await sleep(250);

      // SCHRITT 20: Scoretafel öffnet
      showBestScores();
    }


    renderLoop();
  </script>
</body>
</html>
