<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>DigiKipp – Tschüss</title>

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="DigiKipp">
  <meta name="theme-color" content="#4a2418">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a0e0a;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }

    #wrap {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    #wrap img {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100vw;
      height: auto;
      pointer-events: none;
    }

    #txtTitle {
      position: absolute;
      left: 0; right: 0;
      text-align: center;
      pointer-events: none;
      z-index: 5;
      font-weight: bold;
      letter-spacing: 1px;
      background: linear-gradient(180deg, #f2dca8, #d8b878 40%, #b89850 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.7));
    }

    #txtSub {
      position: absolute;
      left: 10%; right: 10%;
      text-align: center;
      pointer-events: none;
      z-index: 5;
      font-style: normal;
      color: #c8b898;
      font-family: Arial, Helvetica, sans-serif;
      letter-spacing: 0px;
      text-shadow: 0 1px 3px rgba(0,0,0,0.6), 0 0 8px rgba(140,110,60,0.2);
    }

    #imgFade {
      position: absolute;
      left: 0; right: 0;
      height: 30px;
      background: linear-gradient(to bottom, transparent, #1a0e0a);
      pointer-events: none;
      z-index: 2;
    }

    #clickNochmal {
      position: absolute;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      pointer-events: auto;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #e0d8c8;
      letter-spacing: 0.5px;
      text-shadow: 0 1px 3px rgba(0,0,0,0.8);
      background: transparent;
      border: none;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div id="wrap">
    <img id="bgImg" src="tschuess.webp" alt="Tschüss">
    <div id="imgFade"></div>
    <div id="txtTitle">BIS BALD!</div>
    <div id="txtSub">Danke für's Spielen.</div>
    <div id="clickNochmal"></div>
  </div>

  <script>
    var T = {
      de: { t: "BIS BALD!", s: "Danke für's Spielen.", b: "NOCHMAL SPIELEN" },
      en: { t: "SEE YOU SOON!", s: "Thanks for playing.", b: "PLAY AGAIN" },
      es: { t: "¡HASTA PRONTO!", s: "Gracias por jugar.", b: "JUGAR DE NUEVO" },
      fr: { t: "À BIENTÔT !", s: "Merci d'avoir joué.", b: "REJOUER" },
      it: { t: "A PRESTO!", s: "Grazie per aver giocato.", b: "GIOCA ANCORA" },
      tr: { t: "GÖRÜŞÜRÜZ!", s: "Oynadığın için teşekkürler.", b: "TEKRAR OYNA" }
    };
    var lang = "de";
    try { lang = localStorage.getItem("digikipp_lang") || "de"; } catch(e) {}
    var t = T[lang] || T.de;
    document.getElementById("txtTitle").textContent = t.t;
    document.getElementById("txtSub").textContent = t.s;
    document.getElementById("clickNochmal").textContent = t.b;

    function layout() {
      var vw = window.innerWidth;
      var imgH = vw * 2.458; // 360x885

      var title = document.getElementById("txtTitle");
      title.style.top = Math.round(385 / 885 * imgH) + "px";
      title.style.fontSize = Math.round(26 / 360 * vw) + "px";

      var sub = document.getElementById("txtSub");
      sub.style.top = Math.round(420 / 885 * imgH) + "px";
      sub.style.fontSize = Math.round(16 / 360 * vw) + "px";

      var btn = document.getElementById("clickNochmal");
      btn.style.left   = Math.round(68 / 360 * vw) + "px";
      btn.style.top    = Math.round(459 / 885 * imgH) + "px";
      btn.style.width  = Math.round(219 / 360 * vw) + "px";
      btn.style.height = Math.round(39 / 885 * imgH) + "px";
      btn.style.fontSize = Math.round(14 / 360 * vw) + "px";

      var fade = document.getElementById("imgFade");
      if (fade) fade.style.display = "none";
    }

    layout();
    window.addEventListener("resize", layout);

    document.getElementById("clickNochmal").onclick = function() {
      location.href = "index.html";
    };
  </script>
</body>
</html>
