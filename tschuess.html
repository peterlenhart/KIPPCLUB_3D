<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>DigiKipp – Tschüss</title>

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="DigiKipp">
  <meta name="theme-color" content="#4a2418">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a0e0a;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }

    #wrap {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    #wrap img {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      object-position: top center;
      pointer-events: none;
    }

    #clickNochmal {
      position: absolute;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      pointer-events: auto;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      font: bold 18px Arial;
      color: #e0d8c8;
      letter-spacing: 0.5px;
      text-shadow: 0 1px 3px rgba(0,0,0,0.8);
      background: transparent;
      border: none;
    }
  </style>
</head>
<body>
  <div id="wrap">
    <img id="bgImg" src="tschuess.webp" alt="Tschüss">
    <div id="txtTitle" style="position:absolute;left:0;right:0;text-align:center;pointer-events:none;z-index:5;font-weight:bold;color:#d4a843;letter-spacing:1px;text-shadow:0 2px 4px rgba(0,0,0,0.7),0 0 12px rgba(160,120,40,0.3);background:linear-gradient(180deg,#f2dca8,#d8b878 40%,#b89850 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.7));">BIS BALD!</div>
    <div id="txtSub" style="position:absolute;left:10%;right:10%;text-align:center;pointer-events:none;z-index:5;font-style:italic;color:#c8b898;letter-spacing:0px;text-shadow:0 1px 3px rgba(0,0,0,0.6),0 0 8px rgba(140,110,60,0.2);">Danke für's Spielen.</div>
    <div id="clickNochmal"></div>
  </div>

  <script>
    var T = {
      de: { t: "BIS BALD!", s: "Danke für's Spielen.", b: "NOCHMAL SPIELEN" },
      en: { t: "SEE YOU SOON!", s: "Thanks for playing.", b: "PLAY AGAIN" },
      es: { t: "¡HASTA PRONTO!", s: "Gracias por jugar.", b: "JUGAR DE NUEVO" },
      fr: { t: "À BIENTÔT !", s: "Merci d'avoir joué.", b: "REJOUER" },
      it: { t: "A PRESTO!", s: "Grazie per aver giocato.", b: "GIOCA ANCORA" },
      tr: { t: "GÖRÜŞÜRÜZ!", s: "Oynadığın için teşekkürler.", b: "TEKRAR OYNA" }
    };
    var lang = "de";
    try { lang = localStorage.getItem("digikipp_lang") || "de"; } catch(e) {}
    var t = T[lang] || T.de;
    document.getElementById("txtTitle").textContent = t.t;
    document.getElementById("txtSub").textContent = t.s;
    document.getElementById("clickNochmal").textContent = t.b;

    function positionButton() {
      // Positionen gemessen aus Referenzbild (625x1536):
      // BIS BALD! Mitte: y=39% → 540*0.39=210px
      // Danke: Mitte: y=43.5% → 540*0.435=235px
      // Button: y=52%-55.5%, x=21%-78%
      var vw = window.innerWidth;
      var scale = vw / 360;

      var title = document.getElementById("txtTitle");
      title.style.top = Math.round(215 * scale) + "px";
      title.style.fontSize = Math.round(30 * scale) + "px";

      var sub = document.getElementById("txtSub");
      sub.style.top = Math.round(247 * scale) + "px";
      sub.style.fontSize = Math.round(17 * scale) + "px";

      var btn = document.getElementById("clickNochmal");
      btn.style.left   = Math.round(76 * scale) + "px";
      btn.style.top    = Math.round(291 * scale) + "px";
      btn.style.width  = Math.round(205 * scale) + "px";
      btn.style.height = Math.round(19 * scale) + "px";
      btn.style.fontSize = Math.round(14 * scale) + "px";
    }

    positionButton();
    window.addEventListener("resize", positionButton);

    document.getElementById("clickNochmal").onclick = function() {
      location.href = "index.html";
    };
  </script>
</body>
</html>
