    document.getElementById('kpTitle').textContent = t.title;
    document.getElementById('kpSubtitle').textContent = t.subtitle;
    document.getElementById('fl1').textContent = t.fl1;
    document.getElementById('fl2').textContent = t.fl2;
    document.getElementById('fl3').textContent = t.fl3;

    let html = '';
    for (const s of t.sections) {
      if (s.tip) {
        html += '<div class="tip"><p>' + s.p + '</p></div>';
      } else {
        html += '<div class="section"><h2>' + s.t.toUpperCase() + '</h2><p>' + s.p + '</p></div>';
      }
    }
    html += '<hr class="divider">';
    html += '<div class="section" style="text-align:center;"><p>' + t.footer + '</p>';
    html += '<p style="margin-top:18px;color:#d4a843;font-size:16px;letter-spacing:1px;">' + t.closer + '</p></div>';

    document.getElementById('content').innerHTML = html;
  </script>
</body>
</html>
