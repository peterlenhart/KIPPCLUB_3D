<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KIPP CLUB</title>
  <meta property="og:title" content="KIPP CLUB">
  <meta property="og:description" content="3D Kipp-Spiele – Merken, Kippen, Gewinnen!">
  <meta property="og:url" content="https://peterlenhart.github.io/KIPPCLUB_3D/">
  <meta property="og:type" content="website">
  
  <!-- Web App Manifest -->
  <link rel="manifest" href="manifest.json">
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
  
  <!-- iOS Meta Tags -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="KIPP CLUB">
  <link rel="apple-touch-icon" href="icon-192.png">
  
  <!-- Theme Color -->
  <meta name="theme-color" content="#4a2418">

  <style>
    :root{
      --cols: 8;
      --cell: 135px;

      --scale: 0.333333;
      --uiscale: 3;
      --gridW: calc(var(--cols) * var(--cell));
      --gridH: 100vh;

      --ui-panel-bg: #4a2418;
      --ui-text: #ead7be;
      --btn-bg: #ead7be;
      --btn-text: #2a160c;

      --bg-off-x: 0px;
      --bg-off-y: 0px;
      --screen31: 31px;
    }

    html, body{
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      touch-action: manipulation;
      background: #000;
    }

    body{
      display:flex;
      justify-content:center;
      align-items:flex-start;
    }

    .stage{
      width: 100vw;
      height: 100vh;
      position: relative;
      overflow: hidden;
    }

    .layout{
      position: absolute;
      left: 50%;
      top: 0;
      width: var(--gridW);
      height: var(--gridH);
      transform-origin: top center;
      transform: translateX(-50%) scale(var(--scale));
    }

    /* Hintergrund – Startscreen PNG */
    .bgPNG{
      position:absolute;
      left: 0;
      top: 0;
      width: calc(8 * var(--cell));
      height: var(--gridH);
      background-image: url("walls_hintergrund.png");
      background-repeat: no-repeat;
      background-size: calc(8 * var(--cell)) auto;
      background-position:
        calc(0px + var(--bg-off-x))
        calc(0px + var(--bg-off-y));
      pointer-events:none;
      z-index:0;
    }

    /* Untertitel "Merken, Logik, Kopfzerbrechen." in der Zeile oberhalb der Walls
       Hinweis: Wert in skalierter Schicht — wird durch transform:scale(var(--scale)) runterskaliert */
    #kippClubSubtitle {
      position: absolute;
      left: 0;
      top: 22%;
      width: var(--gridW);
      height: 135px;
      line-height: 135px;
      text-align: center;
      font-size: 47px;
      color: #e8dcc0;
      letter-spacing: 4px;
      text-shadow: 0 4px 12px rgba(0,0,0,0.85), 0 0 16px rgba(0,0,0,0.4);
      pointer-events: none;
      z-index: 9;
      font-family: Arial, sans-serif;
      font-weight: 900;
    }

    /* Scroll-Pfeile links und rechts */
    .wallArrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 90px;
      height: 135px;
      line-height: 135px;
      text-align: center;
      font-size: 90px;
      color: #FFD700;
      text-shadow: 0 4px 12px rgba(0,0,0,0.95), 0 0 20px rgba(0,0,0,0.6);
      pointer-events: auto;
      cursor: pointer;
      z-index: 11;
      opacity: 0.85;
      transition: opacity 0.3s ease;
      font-family: Arial, sans-serif;
      font-weight: bold;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .wallArrow.hidden {
      opacity: 0;
      pointer-events: none;
    }
    #wallArrowLeft {
      left: 0;
    }
    #wallArrowRight {
      right: 0;
    }

    /* Wall-Karussell: 6 Walls aneinander, je 1080px Retina / 360px sichtbar, 1 cell suedlicher als zuvor */
    #wallCarousel {
      position: absolute;
      left: 0;
      top: calc(22% + 112px);
      width: var(--gridW);
      height: calc(70% - 142px);
      overflow-x: auto;
      overflow-y: hidden;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      z-index: 8;
      pointer-events: auto;
      padding: 0;
      box-sizing: border-box;
    }
    #wallCarousel::-webkit-scrollbar { display: none; }

    .wallTrack {
      display: flex;
      flex-direction: row;
      gap: 0;
      width: max-content;
      height: 100%;
    }

    .wallSlide {
      flex: 0 0 calc(8 * var(--cell));
      width: calc(8 * var(--cell));
      height: 100%;
      scroll-snap-align: center;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      box-sizing: border-box;
      padding: 0;
      margin: 0;
      position: relative;
    }
    
    /* Walls um 135px ueberlappen ab dem zweiten Slide */
    .wallSlide + .wallSlide {
      margin-left: -135px;
    }
    
    /* Erste Wall snappt links, letzte Wall snappt rechts — damit beide ganz sichtbar */
    .wallSlide:first-child {
      scroll-snap-align: start;
    }
    .wallSlide:last-child {
      scroll-snap-align: end;
    }

    .wallSlide img {
      width: 100%;
      height: auto;
      max-height: 100%;
      object-fit: contain;
      pointer-events: auto;
    }

    /* Buttons auf den Walls — relativ zur Wall positioniert */
    .wallSlide {
      position: relative;
    }
    /* Globaler SPIELEN-Text — auf Raster-Position Zeile 11, im uiLayer (Wall-unabhaengig) */
    #globalSpielenText {
      position: absolute;
      left: 0;
      top: calc((10 * var(--cell)) + 12px + var(--screen31));
      width: var(--gridW);
      height: var(--cell);
      line-height: var(--cell);
      text-align: center;
      font-size: 67px;
      font-family: Arial, sans-serif;
      font-weight: bold;
      letter-spacing: 8px;
      color: #ffffff;
      text-shadow:
        0 0 24px rgba(220,220,220,0.95),
        0 0 48px rgba(200,200,200,0.7),
        0 0 80px rgba(180,180,180,0.5),
        0 8px 16px rgba(0,0,0,0.85);
      z-index: 100;
      display: none;
      pointer-events: auto;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      animation: spielenPulseGlobal 1.8s ease-in-out infinite;
    }
    
    .wallButton {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: var(--gridW);
      height: var(--cell);
      line-height: var(--cell);
      text-align: center;
      font-size: 62px;
      font-family: Arial, sans-serif;
      font-weight: bold;
      letter-spacing: 8px;
      cursor: pointer;
      pointer-events: auto;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      box-sizing: border-box;
    }
    /* SPIELEN-Button auf numberwall (silberne Pille bei ~y=780 im 1232px Wall-Asset) */
    .wallButtonSpielen {
      top: 0;
      color: #ffffff;
      background: transparent;
      border: none;
      text-shadow:
        0 0 24px rgba(220,220,220,0.95),
        0 0 48px rgba(200,200,200,0.7),
        0 0 80px rgba(180,180,180,0.5),
        0 8px 16px rgba(0,0,0,0.8);
      animation: spielenPulse 1.8s ease-in-out infinite;
    }
    @keyframes spielenPulse {
      0%, 100% { transform: translateX(-50%) scale(1); }
      50%      { transform: translateX(-50%) scale(1.06); }
    }
    @keyframes spielenPulseGlobal {
      0%, 100% { transform: scale(1); }
      50%      { transform: scale(1.06); }
    }
    
    /* SPIELEN-Button braun auf Holzleiste der kidskippwall */
    .wallButtonSpielenBraun {
      top: 0;
      color: #3a2410;
      background: transparent;
      border: none;
      -webkit-text-stroke: 2px #3a2410;
      text-shadow:
        0 0 24px rgba(232,220,192,0.95),
        0 0 48px rgba(210,195,160,0.75),
        0 0 80px rgba(190,170,130,0.55),
        0 8px 16px rgba(255,245,220,0.6);
      animation: spielenPulse 1.8s ease-in-out infinite;
    }

    .wallPaywallText {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      top: 0;
      width: var(--gridW);
      height: var(--cell);
      line-height: var(--cell);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 83px;
      font-size: 67px;
      font-family: Arial, sans-serif;
      font-weight: bold;
      letter-spacing: 2px;
      z-index: 100;
      pointer-events: auto;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .wallPaywallSingle {
      color: #ffffff;
      display: inline-block;
      transform-origin: center center;
      animation: none !important;
      text-shadow:
        0 0 24px rgba(220,220,220,0.95),
        0 0 48px rgba(200,200,200,0.7),
        0 0 80px rgba(180,180,180,0.5),
        0 8px 16px rgba(0,0,0,0.85);
    }

    .wallPaywallBundle {
      color: #3a2410;
      display: inline-block;
      transform-origin: center center;
      animation: paywallBundlePulse 1.8s ease-in-out infinite;
      -webkit-text-stroke: 2px #3a2410;
      text-shadow:
        0 0 24px rgba(232,220,192,0.95),
        0 0 48px rgba(210,195,160,0.75),
        0 0 80px rgba(190,170,130,0.55),
        0 8px 16px rgba(255,245,220,0.6);
    }


    
    .wallPaywallSingleSub {
      position: absolute;
      left: 0;
      top: 0;
      color: #ffffff;
      font-size: 45px;
      line-height: 49px;
      font-family: Arial, sans-serif;
      font-weight: bold;
      letter-spacing: 1px;
      white-space: nowrap;
      pointer-events: none;
      z-index: 101;
      display: inline-block;
      transform-origin: center center;
      animation: none !important;
      text-shadow:
        0 0 24px rgba(220,220,220,0.95),
        0 0 48px rgba(200,200,200,0.7),
        0 0 80px rgba(180,180,180,0.5),
        0 8px 16px rgba(0,0,0,0.85);
    }

    .wallPaywallBundleSub {
      position: absolute;
      left: 0;
      top: 0;
      color: #3a2410;
      font-size: 45px;
      line-height: 49px;
      font-family: Arial, sans-serif;
      font-weight: bold;
      letter-spacing: 1px;
      white-space: nowrap;
      pointer-events: none;
      z-index: 101;
      display: inline-block;
      transform-origin: center center;
      animation: paywallBundlePulse 1.8s ease-in-out infinite;
      text-shadow:
        0 0 24px rgba(232,220,192,0.95),
        0 0 48px rgba(210,195,160,0.75),
        0 0 80px rgba(190,170,130,0.55),
        0 8px 16px rgba(255,245,220,0.6);
}

    @keyframes paywallSinglePulse {
      0%, 100% { transform: scale(1); }
      50%      { transform: scale(1.06); }
    }

    @keyframes paywallBundlePulse {
      0%, 100% { transform: scale(1); }
      50%      { transform: scale(1.06); }
    }

    .dimOverlay {
      position: absolute;
      left: 0; top: 0;
      width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.55);
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
      z-index: 5;
    }
    .dimOverlay.active {
      opacity: 1;
    }

    .uiLayer{
      position:absolute;
      left:0;
      top:0;
      width:var(--gridW);
      height:var(--gridH);
      z-index:10;
      pointer-events:none;
    }

    /* Modal */
    .modalOverlay{
      position:fixed;
      left:0;
      top:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.75);
      z-index:9999;
      display:flex;
      align-items:center;
      justify-content:center;
      backdrop-filter:blur(4px);
      opacity:1;
      transition:opacity 0.2s ease;
    }

    .modalOverlay.hidden{
      opacity:0;
      pointer-events:none;
    }

    .modalOverlay.hidden .modalClickArea{
      pointer-events:none;
    }

    .modalContainer{
      position:relative;
      transform: scale(var(--scale));
      transform-origin: center;
    }

    .modalImage{
      display:block;
      width: 1080px;
    }

    .modalClickArea{
      position:absolute;
      cursor:pointer;
      -webkit-tap-highlight-color: transparent;
      pointer-events:auto;
    }

    /* Unsichtbare Klickbereiche für Game Buttons */
    .gameClickArea{
      position:absolute;
      cursor:pointer;
      -webkit-tap-highlight-color: transparent;
      pointer-events:auto;
    }

    /* Unsichtbare Klickbereiche für Icons */
    .iconClickArea{
      position:absolute;
      cursor:pointer;
      -webkit-tap-highlight-color: transparent;
      width: 135px;
      height: 135px;
      pointer-events:auto;
    }

    /* Flashscreen Overlay */
    #flashOverlay{
      position:fixed;
      left:0;
      top:0;
      width:100%;
      height:100%;
      background:#000;
      z-index:99999;
      opacity:1;
      transition:opacity 0.6s ease;
      pointer-events:none;
    }

    #flashOverlay.hidden{
      opacity:0;
    }

    #flashContainer{
      position:absolute;
      left:50%;
      top:0;
      transform:translateX(-50%) scale(var(--scale));
      transform-origin:top center;
    }

    #flashImage{
      display:block;
      width:1080px;
    }

    /* Language Icon & Dropdown */
    #langIcon {
      position: absolute;
      pointer-events: auto;
      cursor: pointer;
      z-index: 15;
    }
    #langIcon img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    #langDropdown {
      display: none;
      position: absolute;
      z-index: 9000;
      pointer-events: auto;
      background-image: url("sprachdrop.png");
      background-size: 100% 100%;
      background-repeat: no-repeat;
      box-shadow: 10px 14px 30px rgba(0,0,0,0.75), 3px 5px 10px rgba(0,0,0,0.5);
      border-radius: 12px;
    }
    #langDropdown.show { display: block; }

    .langRow {
      position: absolute;
      left: 0;
      width: 100%;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      pointer-events: auto;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: 10%;
      box-sizing: border-box;
    }

    /* Toggle Switch */
    .langToggle {
      width: 108px; height: 57px;
      border-radius: 29px;
      background: #1a0e06;
      border: 3px solid #5a3a20;
      position: relative;
      transition: background 0.2s, border-color 0.2s;
    }
    .langToggle.active {
      background: linear-gradient(90deg, #8b6914, #d4a843);
      border-color: #d4a843;
    }
    .langToggle::after {
      content: '';
      position: absolute;
      top: 5px; left: 5px;
      width: 42px; height: 42px;
      border-radius: 50%;
      background: linear-gradient(180deg, #888, #555);
      transition: transform 0.2s, background 0.2s;
    }
    .langToggle.active::after {
      transform: translateX(51px);
      background: linear-gradient(180deg, #f0d080, #c89b30);
    }

    #levelOverlay {
      display:none; position:fixed; left:0; top:0; width:100%; height:100%;
      background:rgba(0,0,0,0.82); backdrop-filter:blur(6px); z-index:8000;
      flex-direction:column; align-items:center; justify-content:flex-start; padding-top:12vh; gap:14px;
    }
    #levelOverlay.show { display:flex; }
    #levelOverlay h2 { font-size:26px; font-weight:bold; letter-spacing:3px; color:#d4b48c; text-shadow:0 2px 6px rgba(0,0,0,0.8); margin-bottom:8px; }
    .lvl-btn { position:relative; width:320px; height:58px; border:none; border-radius:8px; cursor:pointer; display:flex; align-items:center; justify-content:center; font-family:Arial,sans-serif; font-weight:bold; font-size:19px; letter-spacing:2.5px; text-transform:uppercase; color:#d0d0d0; text-shadow:0 1px 1px rgba(255,255,255,0.4),0 -1px 1px rgba(0,0,0,0.6); background:none; overflow:visible; -webkit-tap-highlight-color:transparent; z-index:1; }
    .lvl-btn img.lvl-bg { position:absolute; width:360px; height:auto; top:50%; left:50%; transform:translate(-50%,-50%); pointer-events:none; z-index:-1; }
    .lvl-btn-short { width:152px; height:52px; border:none; border-radius:8px; cursor:pointer; display:flex; align-items:center; justify-content:center; font-family:Arial,sans-serif; font-weight:bold; font-size:16px; letter-spacing:2px; text-transform:uppercase; color:#d0d0d0; text-shadow:0 1px 1px rgba(255,255,255,0.4),0 -1px 1px rgba(0,0,0,0.6); background:url('button_kurz.webp') center/cover no-repeat; -webkit-tap-highlight-color:transparent; }
    .lvl-btn-short:active { filter:brightness(0.85); }
    .lvl-row { display:flex; gap:16px; justify-content:center; }
    .lvl-btn:active { filter:brightness(0.85); }
    .lvl-btn.disabled { opacity:0.3; pointer-events:none; }
    .lvl-sub { font-size:13px; font-weight:bold; letter-spacing:1.5px; color:#a08060; margin-top:4px; text-align:center; }
    .lvl-best { font-size:12px; font-weight:bold; letter-spacing:1px; color:#cedb25; margin-top:2px; text-align:center; min-height:14px; text-shadow:0 1px 2px rgba(0,0,0,0.5); }
    .lvl-group { display:flex; flex-direction:column; align-items:center; gap:0; }
    .lvl-group.hidden { display:none; }
    .lvl-sub-big { font-size:15px; font-weight:bold; letter-spacing:1.5px; color:#a08060; margin-top:-10px; text-align:center; }
    #levelClose { position:absolute; top:12px; left:16px; width:48px; height:48px; cursor:pointer; background:none; border:none; padding:0; -webkit-tap-highlight-color:transparent; pointer-events:auto; }
    #levelClose img { width:100%; height:100%; object-fit:contain; }
  </style>
  <script>
    // Frühestmögliche Skalierung, damit Flashscreen und Layout nicht erst
    // nach dem späteren rebuild() von 0.333333 auf den echten Gerätewert springen.
    (function(){
      var cols = 8;
      var cell = 135;
      var gridW = cols * cell; // 1080 Retina-Pixel
      var vw = window.innerWidth || document.documentElement.clientWidth || 360;
      var scale = Math.min(1, vw / gridW);
      var root = document.documentElement;
      root.style.setProperty("--scale", scale.toFixed(4));
      root.style.setProperty("--gridW", gridW + "px");
      root.style.setProperty("--uiscale", (1 / (scale || 1)).toFixed(4));
      root.style.setProperty("--screen31", (31 / (scale || 1)).toFixed(2) + "px");
    })();
  </script>
</head>

<body>
  <!-- Flashscreen Overlay -->
  <div id="flashOverlay">
    <div id="flashContainer">
      <img id="flashImage" src="flashscreen.webp" alt="DigiKipp">
    </div>
  </div>

  <div class="stage">
    <div class="layout" id="layout">
      <div class="bgPNG"></div>
      <div class="dimOverlay" id="dimOverlay"></div>

      <div class="uiLayer">

        <!-- Slogan in der Zeile oberhalb der Walls -->
        <div id="kippClubSubtitle">Merken, Logik, Kopfzerbrechen.</div>

        <!-- SPIELEN-Text direkt im uiLayer, NICHT in den Walls — Wall-unabhaengig auf Raster-Position -->
        <div id="globalSpielenText">SPIELEN</div>

        <!-- Scroll-Pfeile links und rechts -->
        <div id="wallArrowLeft" class="wallArrow">&#10094;</div>
        <div id="wallArrowRight" class="wallArrow">&#10095;</div>

        <!-- Wall-Karussell: 6 Wall-Bilder horizontal scrollbar -->
        <div id="wallCarousel">
          <div class="wallTrack">
            <div class="wallSlide">
              <img src="numberwall.webp" alt="KIPP NUMBERS" data-theme="numbers">
              <div class="wallButton wallButtonSpielen" data-theme-button="numbers">SPIELEN</div>
            </div>
            <div class="wallSlide">
              <img src="kidskippwall.webp" alt="KIPP ICONS" data-theme="icons">
              <div class="wallButton wallButtonSpielenBraun" data-theme-button="icons">SPIELEN</div>
            </div>
            <div class="wallSlide">
              <img src="smileypaywall.webp" alt="KIPP SMILEYS" data-theme="smileys">
              <div class="wallPaywallText" data-theme-button="smileys">
                <span class="wallPaywallSingle" style="position:relative; left:20px;">€ 0,99</span>
                <span class="wallPaywallBundle" style="position:relative; left:-24px; top:-156px;">CLUB € 4,99</span>
              </div>
              <div class="wallPaywallBundleSub">SMILEY, CARD,<br>QUEEN u. KING</div>
              <div class="wallPaywallSingleSub">Nur SMILEY</div>
            </div>
            <div class="wallSlide"><img src="cardpaywall.webp" alt="KIPP CARD" data-theme="card"></div>
            <div class="wallSlide"><img src="queenpaywall.webp" alt="KIPP QUEEN" data-theme="queen"></div>
            <div class="wallSlide"><img src="kingpaywall.webp" alt="KIPP KING" data-theme="king"></div>
          </div>
        </div>

        <!-- Unsichtbare Klickbereiche für Buttons auf dem Bild (DEAKTIVIERT — kommen später ueber den Walls)
        <div id="clickColor" class="gameClickArea"></div>
        <div id="clickCard" class="gameClickArea"></div>
        <div id="clickKippCard" class="gameClickArea"></div>
        <div id="clickSmiley" class="gameClickArea"></div>
        <div id="clickQueen" class="gameClickArea"></div>
        <div id="clickKing" class="gameClickArea"></div>
        -->
        <div id="clickColor" class="gameClickArea" style="display:none"></div>
        <div id="clickCard" class="gameClickArea" style="display:none"></div>
        <div id="clickKippCard" class="gameClickArea" style="display:none"></div>
        <div id="clickSmiley" class="gameClickArea" style="display:none"></div>
        <div id="clickQueen" class="gameClickArea" style="display:none"></div>
        <div id="clickKing" class="gameClickArea" style="display:none"></div>

        <!-- Unsichtbare Klickbereiche für Icons -->
        <div id="closeBtn" class="iconClickArea"></div>
        <div id="legalBtn" class="iconClickArea"></div>
        <div id="shareBtn" class="iconClickArea"></div>

        <!-- Language Icon at 2F -->
        <div id="langIcon">
          <img src="sprachicon.png" alt="Language">
        </div>

        <!-- Language Dropdown (sprachdrop.png as background) -->
        <div id="langDropdown">
          <div class="langRow" data-lang="de" style="top:33.6%; height:11.2%"><div class="langToggle"></div></div>
          <div class="langRow" data-lang="en" style="top:45.0%; height:9.0%"><div class="langToggle"></div></div>
          <div class="langRow" data-lang="it" style="top:54.3%; height:8.8%"><div class="langToggle"></div></div>
          <div class="langRow" data-lang="fr" style="top:63.4%; height:9.0%"><div class="langToggle"></div></div>
          <div class="langRow" data-lang="es" style="top:72.7%; height:8.6%"><div class="langToggle"></div></div>
          <div class="langRow" data-lang="tr" style="top:81.5%; height:10.4%"><div class="langToggle"></div></div>
        </div>

      </div>
    </div>
  </div>

  <!-- Level-Auswahl Overlay -->
  <div id="levelOverlay">
    <button id="levelClose" onclick="document.getElementById('levelOverlay').classList.remove('show')"><img id="levelCloseBg" src="rw.webp" alt="Zurück"></button>
    <h2 id="lvlTitle">WÄHLE DEIN LEVEL</h2>
    <div class="lvl-group">
      <div class="lvl-btn" id="lvlTraining"><img class="lvl-bg" id="lvlTrainingBg" src="button_lang_braun.webp">BUMBLEBRAIN</div>
      <div class="lvl-sub" id="lvlSubTraining">mit TUTORIAL</div>
      <div class="lvl-best" id="lvlBestTraining"></div>
    </div>
    <div class="lvl-group">
      <div class="lvl-btn" id="lvlBrainy"><img class="lvl-bg" id="lvlBrainyBg" src="button_lang_rotbraun_glow.webp">BRAINY</div>
      <div class="lvl-best" id="lvlBestBrainy"></div>
    </div>
    <div class="lvl-group">
      <div class="lvl-btn" id="lvlBrain"><img class="lvl-bg" id="lvlBrainBg" src="button_lang_orange_glow.webp">BRAIN</div>
      <div class="lvl-best" id="lvlBestBrain"></div>
    </div>
    <div class="lvl-group">
      <div class="lvl-btn" id="lvlK21"><img class="lvl-bg" src="button_lang_gold_glow.webp">MASTER BRAIN</div>
      <div class="lvl-best" id="lvlBestK21"></div>
    </div>
  </div>

  <!-- Modal -->
  <div id="closeModal" class="modalOverlay hidden">
    <div class="modalContainer">
      <img src="sicherheitsabfrage.webp" class="modalImage" alt="Sicherheitsabfrage">
      <div id="modalTitle" style="position:absolute;left:0;right:0;top:36%;text-align:center;font:bold 67px Arial;color:#e8dcc0;letter-spacing:3px;text-shadow:0 2px 8px rgba(0,0,0,0.8);pointer-events:none;">Spiel beenden?</div>
      <div id="modalSub" style="position:absolute;left:5%;right:5%;top:42%;text-align:center;font:400 41px Arial;color:#c0b098;letter-spacing:0.5px;text-shadow:0 1px 4px rgba(0,0,0,0.8);pointer-events:none;">Möchtest du das Spiel<br>wirklich beenden?</div>
      <div id="modalAbbrechen" class="modalClickArea" style="display:flex;align-items:center;justify-content:center;font:bold 43px Arial;color:#d0d8c0;letter-spacing:2px;text-shadow:0 1px 4px rgba(0,0,0,0.8);"></div>
      <div id="modalBeenden" class="modalClickArea" style="display:flex;align-items:center;justify-content:center;font:bold 43px Arial;color:#e0c8b0;letter-spacing:2px;text-shadow:0 1px 4px rgba(0,0,0,0.8);"></div>
    </div>
  </div>

  <script>

    // Flashscreen: Warten bis Bild geladen ist, dann 2 Sek anzeigen
    const flashImg = document.getElementById("flashImage");
    const flashOverlay = document.getElementById("flashOverlay");
    
    if(flashImg.complete) {
      hideFlash();
    } else {
      flashImg.onload = hideFlash;
      flashImg.onerror = hideFlash;
    }
    
    function hideFlash() {
      const noFlash = new URLSearchParams(window.location.search).get('noflash') === '1';
      const delay = noFlash ? 0 : 2000;
      setTimeout(() => {
        flashOverlay.classList.add("hidden");
        setTimeout(() => flashOverlay.style.display = "none", noFlash ? 0 : 600);
      }, delay);
    }

    const HEADER_ROW_OFFSET = 2;

    function numVar(name){
      return parseFloat(
        getComputedStyle(document.documentElement).getPropertyValue(name)
      ) || 0;
    }

    function setScaleToFitWidth(){
      const cols = numVar("--cols") || 8;
      const cell = numVar("--cell") || 135;

      const gridW = cols * cell;
      const vw = window.innerWidth;

      const targetW = vw;
      const scale = Math.min(1, targetW / gridW);

      document.documentElement.style.setProperty("--scale", scale.toFixed(4));
      document.documentElement.style.setProperty("--gridW", gridW + "px");

      const uiscale = 1 / (scale || 1);
      document.documentElement.style.setProperty("--uiscale", uiscale.toFixed(4));

      // Sichtbare Pixel in interne Layout-Pixel umrechnen,
      // weil .layout per transform: scale(...) verkleinert wird.
      document.documentElement.style.setProperty("--screen31", (31 / (scale || 1)).toFixed(2) + "px");

      return { cell, scale, gridW };
    }

    function positionUI(){
      const cellPx = numVar("--cell") || 135;

      const clickColor = document.getElementById("clickColor");
      const clickCard  = document.getElementById("clickCard");
      const clickKippCard = document.getElementById("clickKippCard");
      const clickSmiley = document.getElementById("clickSmiley");
      const clickQueen = document.getElementById("clickQueen");
      const clickKing  = document.getElementById("clickKing");

      // Alle Buttons: halbe Spalte B (1.5) bis halbe Spalte G (6.5) = 5 Spalten breit
      const btnLeft = cellPx * 1.5;
      const btnWidth = cellPx * 5;
      const btnHeight = cellPx;

      // Zahlen (Level-Overlay): Zeile 7, Spalten B-D
      const zahlenTop = 6 * cellPx;
      const zahlenHeight = cellPx;
      clickColor.style.left = (cellPx * 1) + "px";
      clickColor.style.top = zahlenTop + "px";
      clickColor.style.width = (cellPx * 3) + "px";
      clickColor.style.height = zahlenHeight + "px";

      // Motive (coloricon.html): Zeile 7, Spalten E-G
      clickCard.style.left = (cellPx * 4) + "px";
      clickCard.style.top = zahlenTop + "px";
      clickCard.style.width = (cellPx * 3) + "px";
      clickCard.style.height = zahlenHeight + "px";

      // KIPP CARD: Zeile 8, kein Offset
      // KIPP CARD: Zeile 10,5 bis 11,5
      clickKippCard.style.left = btnLeft + "px";
      clickKippCard.style.top = (9.5 * cellPx) + "px";
      clickKippCard.style.width = btnWidth + "px";
      clickKippCard.style.height = cellPx + "px";

      // KIPP SMILEY: Zeile 9, kein Offset
      clickSmiley.style.left = btnLeft + "px";
      clickSmiley.style.top = (8 * cellPx) + "px";
      clickSmiley.style.width = btnWidth + "px";
      clickSmiley.style.height = btnHeight + "px";

      // KIPP QUEEN: Zeile 10
      const row10 = ((10 + HEADER_ROW_OFFSET - 1) * cellPx);
      clickQueen.style.left = btnLeft + "px";
      clickQueen.style.top = row10 + "px";
      clickQueen.style.width = btnWidth + "px";
      clickQueen.style.height = btnHeight + "px";

      // KIPP KING: Zeile 12
      const row12 = ((12 + HEADER_ROW_OFFSET - 1) * cellPx);
      clickKing.style.left = btnLeft + "px";
      clickKing.style.top = row12 + "px";
      clickKing.style.width = btnWidth + "px";
      clickKing.style.height = btnHeight + "px";

      // Icon-Klickbereiche in Zeile 0_2
      const iconRow = cellPx; // Zeile 0_2 = 1 Zelle tiefer
      const iconSize = cellPx; // 135x135px

      // Close Button: zwischen Spalten A und B = Spalte 0.5
      const closeBtn = document.getElementById("closeBtn");
      closeBtn.style.left = (cellPx * 0.5) + "px";
      closeBtn.style.top = iconRow + "px";

      // Legal (§) Button: Spalte C = Spalte 2
      const legalBtn = document.getElementById("legalBtn");
      legalBtn.style.left = (cellPx * 2) + "px";
      legalBtn.style.top = iconRow + "px";

      // Share Button: zwischen Spalten G und H = Spalte 6.5
      const shareBtn = document.getElementById("shareBtn");
      shareBtn.style.left = (cellPx * 6.5) + "px";
      shareBtn.style.top = iconRow + "px";

      // Language Icon: Zelle 2F (Spalte F = index 5, row 0_2)
      const langIcon = document.getElementById("langIcon");
      langIcon.style.left = (cellPx * 4.5) + "px";
      langIcon.style.top = (iconRow - 8) + "px";
      langIcon.style.width = (cellPx * 1.303) + "px";
      langIcon.style.height = (cellPx * 1.303) + "px";

      // SPIELEN-Texte: globales Raster, Zeile 11.
      // Die Texte liegen in den Wall-Slides und scrollen mit,
      // aber ihre vertikale Position wird vom Displayraster aus berechnet.
      const wallCarousel = document.getElementById("wallCarousel");
      const spielenRow11Y = 10 * cellPx;
      const wallTopY = wallCarousel ? wallCarousel.offsetTop : 0;
      document.querySelectorAll('[data-theme-button]').forEach(el => {
        el.style.top = ((spielenRow11Y - wallTopY) + 80) + "px";
      });

      // Untertext als eigenes Element, ohne Einfluss auf € 0,99 und CLUB € 4,99.
      document.querySelectorAll('.wallPaywallBundleSub').forEach(el => {
        el.style.left = "calc(50% - 27px)";
        el.style.top = ((spielenRow11Y - wallTopY) + 80) + "px";
      });

      // Silberner Subtext unter €0,99:
      // Vertikale Position bleibt unverändert.
      // Horizontal wird die echte linke Kante des €0,99-Textes gemessen.
      document.querySelectorAll('.wallPaywallSingleSub').forEach(el => {
        const singlePrice = document.querySelector('.wallPaywallSingle');
        const slide = singlePrice ? singlePrice.closest('.wallSlide') : null;
        const scale = numVar("--scale") || 1;

        if (singlePrice && slide) {
          const priceRect = singlePrice.getBoundingClientRect();
          const slideRect = slide.getBoundingClientRect();
          el.style.left = (((priceRect.left - slideRect.left) / scale) - (8 / scale)) + "px";
        }

        el.style.top = ((spielenRow11Y - wallTopY) + 215) + "px";
      });

      // Language Dropdown: 6 Zellen breit (1.5x), Höhe proportional (Bild 700×935)
      const langDD = document.getElementById("langDropdown");
      const ddWidth = cellPx * 6;
      const ddHeight = ddWidth * (935 / 700);
      const ddRight = cellPx * 6;
      const ddLeft = ddRight - ddWidth;
      langDD.style.width = ddWidth + "px";
      langDD.style.height = ddHeight + "px";
      langDD.style.left = Math.max(0, ddLeft) + "px";
      langDD.style.top = (iconRow + cellPx + 8) + "px";
    }

    function rebuild(){
      const { cell, scale } = setScaleToFitWidth();
      const vh = window.innerHeight;
      const effective = vh / (scale || 1);
      const rows = Math.ceil(effective / cell) + 1;
      const gridH = rows * cell;
      document.documentElement.style.setProperty("--gridH", gridH + "px");
      positionUI();
    }

    window.addEventListener("load", rebuild);
    window.addEventListener("resize", rebuild);
    requestAnimationFrame(rebuild);
    
    // Scroll-Pfeile dynamisch ein-/ausblenden je nach Karussell-Position
    // und Klick-Handler fuer Pfeil-Navigation
    (function setupWallArrows() {
      function updateArrows() {
        const car = document.getElementById('wallCarousel');
        const arrL = document.getElementById('wallArrowLeft');
        const arrR = document.getElementById('wallArrowRight');
        if (!car || !arrL || !arrR) return;
        const atStart = car.scrollLeft <= 2;
        const atEnd = car.scrollLeft >= (car.scrollWidth - car.clientWidth - 2);
        if (atStart) arrL.classList.add('hidden'); else arrL.classList.remove('hidden');
        if (atEnd) arrR.classList.add('hidden'); else arrR.classList.remove('hidden');
      }
      function scrollByOne(direction) {
        const car = document.getElementById('wallCarousel');
        if (!car) return;
        // Eine Wall-Breite minus Ueberlappung = effektive Schrittweite
        const cell = numVar("--cell") || 135;
        const step = (8 * cell) - 135; // eine Wall-Breite minus 1 Zelle Überlappung
        car.scrollBy({ left: direction * step, behavior: 'smooth' });
      }
      window.addEventListener('load', () => {
        const car = document.getElementById('wallCarousel');
        const arrL = document.getElementById('wallArrowLeft');
        const arrR = document.getElementById('wallArrowRight');
        if (car) {
          car.addEventListener('scroll', updateArrows);
          setTimeout(updateArrows, 100);
        }
        if (arrL) {
          arrL.style.pointerEvents = 'auto';
          arrL.style.cursor = 'pointer';
          arrL.addEventListener('click', () => scrollByOne(-1));
        }
        if (arrR) {
          arrR.style.pointerEvents = 'auto';
          arrR.style.cursor = 'pointer';
          arrR.addEventListener('click', () => scrollByOne(1));
        }
      });
    })();

    // Game navigation
    let selectedSkin = 'numbers';
    document.getElementById("clickColor").onclick = () => {
      selectedSkin = 'numbers';
      updateLevelLinks();
      updateLevelBests();
      document.getElementById("levelOverlay").classList.add("show");
    };
    document.getElementById("clickCard").onclick = () => {
      selectedSkin = 'icons';
      updateLevelLinks();
      updateLevelBests();
      document.getElementById("levelOverlay").classList.add("show");
    };
    // KIPP QUEEN: eigene HTML, Level MASTERBRAIN
    document.getElementById("clickQueen").onclick = () => {
      location.href = 'kipp_queen.html?level=masterbrain';
    };
    // KIPP KING: eigene HTML, Level MASTERBRAIN
    document.getElementById("clickKing").onclick = () => {
      location.href = 'kipp_king.html?level=masterbrain';
    };
    function updateLevelLinks() {
      let base, mb;
      if (selectedSkin === 'icons') {
        base = 'coloricon.html';
        mb = 'kipp21_icon.html';
      } else if (selectedSkin === 'card') {
        base = 'card.html';
        mb = 'card.html?level=masterbrain';
      } else {
        base = 'training.html';
        mb = 'training.html?level=masterbrain';
      }
      document.getElementById('lvlTraining').onclick = () => location.href = base;
      document.getElementById('lvlBrainy').onclick = () => location.href = base + '?level=brainy';
      document.getElementById('lvlBrain').onclick = () => location.href = base + '?level=brain';
      document.getElementById('lvlK21').onclick = () => location.href = mb;
      document.getElementById('lvlK21').style.display = selectedSkin === 'icons' ? 'none' : '';
      // Die ganze Group (inkl. Best-Zeile) verstecken bei icons
      const _k21Group = document.getElementById('lvlK21').closest('.lvl-group');
      if (_k21Group) _k21Group.style.display = selectedSkin === 'icons' ? 'none' : '';
      // Button-Bilder + Stil je nach Theme
      if (selectedSkin === 'icons') {
        document.getElementById('lvlTrainingBg').src = 'button_lang_icon_1.webp';
        document.getElementById('lvlBrainyBg').src = 'button_lang_icon_1.webp';
        document.getElementById('lvlBrainBg').src = 'button_lang_icon_2.webp';
        document.getElementById('levelCloseBg').src = 'reset_icon.png';
        var iconImgStyle = 'position:absolute;width:288px;height:auto;top:50%;left:50%;pointer-events:none;z-index:-1;';
        document.getElementById('lvlTrainingBg').style.cssText = iconImgStyle + 'transform:translate(-50%,-50%) rotate(180deg);';
        document.getElementById('lvlBrainyBg').style.cssText = iconImgStyle + 'transform:translate(-50%,-50%);';
        document.getElementById('lvlBrainBg').style.cssText = iconImgStyle + 'transform:translate(-50%,-50%) rotate(180deg);';
        ['lvlTraining','lvlBrainy','lvlBrain'].forEach(function(id) {
          document.getElementById(id).style.color = '#3a2210';
          document.getElementById(id).style.textShadow = '0 1px 1px rgba(255,255,255,0.3), 0 -1px 1px rgba(0,0,0,0.15)';
        });
      } else {
        document.getElementById('lvlTrainingBg').src = 'button_lang_braun.webp';
        document.getElementById('lvlBrainyBg').src = 'button_lang_rotbraun_glow.webp';
        document.getElementById('lvlBrainBg').src = 'button_lang_orange_glow.webp';
        document.getElementById('levelCloseBg').src = 'rw.webp';
        var origImgStyle = 'position:absolute;width:360px;height:auto;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:-1;';
        ['lvlTrainingBg','lvlBrainyBg','lvlBrainBg'].forEach(function(id) {
          document.getElementById(id).style.cssText = origImgStyle;
        });
        ['lvlTraining','lvlBrainy','lvlBrain'].forEach(function(id) {
          document.getElementById(id).style.color = '#d0d0d0';
          document.getElementById(id).style.textShadow = '0 1px 1px rgba(255,255,255,0.4),0 -1px 1px rgba(0,0,0,0.6)';
        });
      }
    }
    updateLevelLinks();

    // SPIELEN-Texte sind in den ersten beiden Wall-Dateien verankert und scrollen mit.
    document.querySelectorAll('[data-theme-button="numbers"]').forEach(el => {
      el.onclick = (e) => {
        e.stopPropagation();
        selectedSkin = 'numbers';
        updateLevelLinks();
        updateLevelBests();
        document.getElementById("levelOverlay").classList.add("show");
      };
    });
    document.querySelectorAll('[data-theme-button="icons"]').forEach(el => {
      el.onclick = (e) => {
        e.stopPropagation();
        selectedSkin = 'icons';
        updateLevelLinks();
        updateLevelBests();
        document.getElementById("levelOverlay").classList.add("show");
      };
    });
    document.querySelectorAll('[data-theme-button="smileys"]').forEach(el => {
      el.onclick = (e) => {
        e.stopPropagation();
        location.href = 'smiley.html';
      };
    });

    // === Bestleistungen pro Level aus localStorage anzeigen ===
    function updateLevelBests() {
      let scores = [];
      try {
        const raw = localStorage.getItem('digikipp_bestscores_v2');
        if (raw) scores = JSON.parse(raw) || [];
      } catch(e) { scores = []; }
      
      // Aktuell ausgewaehlten Skin pruefen (numbers oder icons)
      const currentSkin = (typeof selectedSkin !== 'undefined' ? selectedSkin : null) || localStorage.getItem('digikipp_skin') || 'numbers';
      
      // Beste Pct + Hits pro Level ermitteln - GETRENNT nach Skin
      function bestForLvl(lvlNum) {
        const filtered = scores.filter(s => s.level === lvlNum && (s.skin || 'numbers') === currentSkin);
        if (filtered.length === 0) return null;
        filtered.sort((a, b) => b.pct - a.pct || a.fails - b.fails);
        return filtered[0];
      }
      
      const lvlMap = [
        { id: 'lvlBestTraining', lvl: 1 },
        { id: 'lvlBestBrainy',   lvl: 2 },
        { id: 'lvlBestBrain',    lvl: 3 },
        { id: 'lvlBestK21',      lvl: 4 }
      ];
      
      const labelMap = {
        de: 'Beste', en: 'Best', es: 'Mejor', fr: 'Meilleur', it: 'Migliore', tr: 'En iyi'
      };
      const userLang = localStorage.getItem('digikipp_lang') || 'de';
      const label = labelMap[userLang] || labelMap.de;
      
      for (const m of lvlMap) {
        const el = document.getElementById(m.id);
        if (!el) continue;
        const best = bestForLvl(m.lvl);
        if (best) {
          el.textContent = label + ': ' + best.pct + '% (' + best.hits + '/' + (best.hits + best.fails) + ')';
        } else {
          el.textContent = '';
        }
      }
    }
    updateLevelBests();

    // ?theme= Parameter: automatisch Level-Overlay öffnen
    const _themeParam = new URLSearchParams(window.location.search).get('theme');
    if (_themeParam === 'numbers' || _themeParam === 'icons') {
      selectedSkin = _themeParam === 'icons' ? 'icons' : 'numbers';
      updateLevelLinks();
      updateLevelBests();
      document.getElementById("levelOverlay").classList.add("show");
    }

    // KIPP CARD
    document.getElementById("clickKippCard").onclick = () => {
      location.href = 'card.html';
    };

    // KIPP SMILEY
    document.getElementById("clickSmiley").onclick = () => {
      location.href = 'smiley.html';
    };

    // Modal
    const closeBtn = document.getElementById("closeBtn");
    const closeModal = document.getElementById("closeModal");
    const modalAbbrechen = document.getElementById("modalAbbrechen");
    const modalBeenden = document.getElementById("modalBeenden");

    // Klickbereiche exakt auf Buttons (Prozent vom Bild)
    modalAbbrechen.style.left = "21%";
    modalAbbrechen.style.top = "51%";
    modalAbbrechen.style.width = "26%";
    modalAbbrechen.style.height = "7%";
    
    modalBeenden.style.left = "57%";
    modalBeenden.style.top = "51%";
    modalBeenden.style.width = "23%";
    modalBeenden.style.height = "7%";

    closeBtn.onclick = () => closeModal.classList.remove("hidden");
    modalAbbrechen.onclick = () => closeModal.classList.add("hidden");
    modalBeenden.onclick = () => location.href="tschuess.html";

    closeModal.onclick = (e) => { if(e.target === closeModal) closeModal.classList.add("hidden"); };

    // Teilen
    function shareApp(){
      const url = window.location.href;
      const t = LVL_T[currentLang] || LVL_T.de;
      const text = t.share;

      if(navigator.share){
        navigator.share({ title:"DigiKipp", text, url }).catch(()=>{});
      } else {
        window.open("https://wa.me/?text=" + encodeURIComponent(text + " " + url), "_blank");
      }
    }

    document.getElementById("shareBtn").onclick = shareApp;

    // Legal (§) Button
    document.getElementById("legalBtn").onclick = () => {
      window.open("legal.html", "_blank");
    };

    // === LANGUAGE SELECTION ===
    const langDropdown = document.getElementById("langDropdown");
    const langIcon = document.getElementById("langIcon");
    const langRows = document.querySelectorAll(".langRow");

    // Aktive Sprache aus localStorage oder default DE
    let currentLang = localStorage.getItem("digikipp_lang") || "de";

    function updateToggles() {
      langRows.forEach(row => {
        const toggle = row.querySelector(".langToggle");
        if (row.dataset.lang === currentLang) {
          toggle.classList.add("active");
        } else {
          toggle.classList.remove("active");
        }
      });
    }
    updateToggles();

    // Icon klick → Dropdown auf/zu
    langIcon.onclick = (e) => {
      e.stopPropagation();
      langDropdown.classList.toggle("show");
      document.getElementById("dimOverlay").classList.toggle("active", langDropdown.classList.contains("show"));
    };

    // Sprache wählen → setzen, schließen
    langRows.forEach(row => {
      row.onclick = (e) => {
        e.stopPropagation();
        currentLang = row.dataset.lang;
        localStorage.setItem("digikipp_lang", currentLang);
        updateToggles();
        // Auto-close nach kurzer Verzögerung
        setTimeout(() => { langDropdown.classList.remove("show"); document.getElementById("dimOverlay").classList.remove("active"); applyLevelLang(); }, 200);
      };
    });

    // Klick außerhalb → Dropdown schließen
    document.addEventListener("click", () => {
      langDropdown.classList.remove("show");
      document.getElementById("dimOverlay").classList.remove("active");
    });
    langDropdown.onclick = (e) => e.stopPropagation();

    // === LEVEL OVERLAY TRANSLATIONS ===
