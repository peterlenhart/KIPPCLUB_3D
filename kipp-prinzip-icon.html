    body { display:flex; justify-content:center; }

      color:#a08060; margin-bottom:28px;
    }
    .section { margin-bottom:24px; }
    .section h2 {
      font-size:17px; font-weight:bold; letter-spacing:2px;
      color:#cedb25; margin-bottom:8px;
      text-shadow:0 1px 4px rgba(0,0,0,0.5);

</head>

  <button class="back-btn" onclick="history.back()">

    const t = T[lang] || T.de;

    document.getElementById('kpTitle').textContent = t.title;
    document.getElementById('kpSubtitle').textContent = t.subtitle;

    let html = '';
    for (const s of t.sections) {
      if (s.tip) {
        html += '<div class="tip"><p>' + s.p + '</p></div>';
      } else {
        html += '<div class="section"><h2>' + s.t.toUpperCase() + '</h2><p>' + s.p + '</p></div>';
      }
    }
    html += '<hr class="divider">';
    html += '<div class="section" style="text-align:center;"><p>' + t.footer + '</p>';
    html += '<p style="margin-top:18px;color:#d4a843;font-size:16px;letter-spacing:1px;">' + t.closer + '</p></div>';

    document.getElementById('content').innerHTML = html;

</body>
</html>
